<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCIA 第0期生 テストフライト募集 | セカンドキャリア・インキュベーション協会</title>

    <!-- Google Fonts: Noto Sans JP -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mint: { light: '#E2F2EF', DEFAULT: '#A2D2C9', dark: '#5FAFA2' },
                        salmon: { light: '#FDECE9', DEFAULT: '#F4A698', dark: '#E27D6B' }
                    },
                    fontFamily: { sans: ['"Noto Sans JP"', 'sans-serif'] }
                }
            }
        }
    </script>

    <!-- React 関連ライブラリ -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            color: #333333;
            overflow-x: hidden;
        }

        .text-gradient {
            background: linear-gradient(135deg, #5FAFA2, #E27D6B);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-gold {
            background: linear-gradient(135deg, #C9A84C, #E8D08A, #C9A84C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
        @keyframes float-reverse {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(15px) rotate(-2deg); }
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(242, 166, 152, 0.6); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(242, 166, 152, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(242, 166, 152, 0); }
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-float-delayed { animation: float-reverse 7s ease-in-out infinite 1s; }
        .animate-blob { animation: blob 15s infinite alternate; }
        .animate-pulse-ring { animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite; }

        .shimmer-bg {
            background: linear-gradient(90deg, #E27D6B 0%, #F4A698 30%, #fff8f7 50%, #F4A698 70%, #E27D6B 100%);
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }

        .ken-burns {
            transition: transform 7s ease-out, opacity 1.5s ease-in-out;
            transform: scale(1);
        }
        .ken-burns.active { transform: scale(1.08); }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #A2D2C9; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #5FAFA2; }

        .badge-zero {
            background: linear-gradient(135deg, #C9A84C, #E8D08A);
            color: #5a3e00;
        }

        .border-gold { border-color: #C9A84C; }
        .text-gold { color: #C9A84C; }
        .bg-gold-light { background-color: #fdf9ee; }
    </style>
</head>
<body class="bg-gray-50 antialiased">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- インラインSVGアイコン ---
        const MenuIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        );
        const XIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        );
        const ArrowRightIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        );
        const CheckCircleIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
        );
        const StarIcon = ({ size = 24, className = "", fill = "none" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        );
        const LinkedinIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        );
        const RocketIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
        );
        const GiftIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
        );
        const UsersIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        );
        const MessageCircleIcon = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
        );

        // --- FadeIn アニメーションコンポーネント ---
        const FadeIn = ({ children, delay = 0, direction = 'up', className = "" }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef();

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(entry.target);
                        }
                    },
                    { threshold: 0.1 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);

            const getTransform = () => {
                if (isVisible) return 'translate-y-0 translate-x-0';
                switch (direction) {
                    case 'up': return 'translate-y-12';
                    case 'down': return '-translate-y-12';
                    case 'left': return 'translate-x-12';
                    case 'right': return '-translate-x-12';
                    default: return 'translate-y-12';
                }
            };

            return (
                <div
                    ref={ref}
                    className={`transition-all duration-1000 ease-out ${isVisible ? 'opacity-100' : 'opacity-0'} ${getTransform()} ${className}`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        // --- 画像フォールバックコンポーネント ---
        const SafeImage = ({ src, alt, className, activeClass = "" }) => {
            const [error, setError] = useState(false);
            if (error) {
                return (
                    <div className={`flex items-center justify-center bg-mint-light/50 ${className} ${activeClass}`}>
                        <span className="text-mint-dark text-sm font-medium px-4 text-center border-2 border-dashed border-mint rounded-xl py-2 bg-white/50 backdrop-blur-sm">
                            画像未設定:<br/>{src}
                        </span>
                    </div>
                );
            }
            return (
                <img
                    src={src}
                    alt={alt}
                    className={`${className} ${activeClass}`}
                    onError={() => setError(true)}
                />
            );
        };

        // --- ヒーロースライダー ---
        const HeroSlider = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const images = ["image/image1.png", "image/image2.png", "image/image3.png"];

            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentSlide((prev) => (prev + 1) % images.length);
                }, 5000);
                return () => clearInterval(timer);
            }, [images.length]);

            return (
                <div className="w-full h-[380px] md:h-[480px] rounded-[40px] shadow-2xl overflow-hidden relative z-10 animate-float border-4 border-white bg-mint-light">
                    {images.map((src, index) => (
                        <SafeImage
                            key={index}
                            src={src}
                            alt={`スライド ${index + 1}`}
                            className={`absolute inset-0 w-full h-full object-cover ken-burns`}
                            activeClass={index === currentSlide ? "opacity-100 active z-10" : "opacity-0 z-0"}
                        />
                    ))}
                    {/* 0期生バッジ */}
                    <div className="absolute top-6 left-6 z-30 badge-zero px-4 py-2 rounded-full font-black text-sm shadow-lg tracking-wider">
                        第0期生 限定募集
                    </div>
                    <div className="absolute bottom-8 left-0 right-0 flex justify-center space-x-3 z-30">
                        {images.map((_, index) => (
                            <button
                                key={index}
                                onClick={() => setCurrentSlide(index)}
                                className={`h-2.5 rounded-full transition-all duration-300 ${index === currentSlide ? 'w-8 bg-white shadow-md' : 'w-2.5 bg-white/50 hover:bg-white/80'}`}
                                aria-label={`スライド ${index + 1} を表示`}
                            />
                        ))}
                    </div>
                </div>
            );
        };

        // --- 0期生特典カード ---
        const BenefitCard = ({ icon, title, desc, delay }) => (
            <FadeIn delay={delay}>
                <div className="bg-white rounded-3xl p-7 shadow-md border border-gray-100 hover:shadow-xl hover:-translate-y-2 transition-all duration-300 h-full flex flex-col gap-4">
                    <div className="w-14 h-14 bg-gradient-to-br from-mint-dark to-mint text-white rounded-2xl flex items-center justify-center shadow-md flex-shrink-0">
                        {icon}
                    </div>
                    <h4 className="font-bold text-gray-800 text-lg leading-snug">{title}</h4>
                    <p className="text-gray-600 text-sm leading-relaxed flex-grow">{desc}</p>
                </div>
            </FadeIn>
        );

        // --- プログラムステップカード ---
        const StepCard = ({ month, title, subtitle, color, headline, desc, steps, instructor, instructorImage, delay }) => {
            const isMint = color === 'mint';
            const bgColor = isMint ? 'bg-mint-dark' : 'bg-salmon-dark';
            const textColor = isMint ? 'text-mint-dark' : 'text-salmon-dark';
            const stepBg = isMint ? 'bg-mint-light text-mint-dark' : 'bg-salmon-light text-salmon-dark';
            return (
                <FadeIn delay={delay}>
                    <div className="bg-white rounded-3xl shadow-md p-8 pt-10 relative hover:shadow-xl hover:-translate-y-2 transition-all duration-300 border border-gray-100 h-full flex flex-col group">
                        <div className={`absolute -top-6 left-1/2 transform -translate-x-1/2 w-14 h-14 ${bgColor} text-white rounded-2xl flex items-center justify-center font-black text-2xl shadow-lg rotate-3 group-hover:rotate-0 transition-transform`}>
                            {month}
                        </div>
                        <h3 className={`text-2xl font-bold text-center mt-2 mb-1 ${textColor}`}>{title}</h3>
                        <p className="text-center text-sm text-gray-400 mb-4">{subtitle}</p>
                        <h4 className="font-bold text-center mb-5 text-gray-800 pb-4 border-b border-gray-100">{headline}</h4>
                        <p className="text-gray-600 mb-5 text-sm leading-relaxed flex-grow">{desc}</p>
                        {/* 3ステップフロー */}
                        <div className="flex items-stretch gap-1 mb-4">
                            {steps.map((step, i) => (
                                <React.Fragment key={i}>
                                    <div className={`flex-1 rounded-xl px-2 py-2.5 text-center ${stepBg}`}>
                                        <p className="text-[10px] font-black opacity-60 mb-0.5">0{i+1}</p>
                                        <p className="text-[11px] font-bold leading-tight">{step}</p>
                                    </div>
                                    {i < steps.length - 1 && (
                                        <div className="flex items-center text-gray-300 text-xs font-bold shrink-0">›</div>
                                    )}
                                </React.Fragment>
                            ))}
                        </div>
                        {/* 担当講師 */}
                        <div className="flex items-center gap-3 pt-3 border-t border-gray-50">
                            <div className={`w-8 h-8 rounded-full overflow-hidden shrink-0 border-2 ${isMint ? 'border-mint' : 'border-salmon'} bg-gray-100`}>
                                <SafeImage src={instructorImage} alt={instructor} className="w-full h-full object-cover object-top" />
                            </div>
                            <div>
                                <p className="text-[10px] text-gray-400 leading-none mb-0.5">担当講師</p>
                                <p className={`text-xs font-bold ${textColor}`}>{instructor}</p>
                            </div>
                        </div>
                    </div>
                </FadeIn>
            );
        };

        // --- メインアプリ ---
        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollTo = (id) => {
                setIsMenuOpen(false);
                const element = document.getElementById(id);
                if (element) element.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="relative">

                    {/* --- ヘッダー --- */}
                    <header className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white/90 backdrop-blur-md shadow-md py-3' : 'bg-transparent py-5'}`}>
                        <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between">
                            <a href="site06.html" className="text-2xl font-black tracking-tight text-mint-dark flex items-center gap-2 group">
                                <span className="bg-mint-dark text-white px-2 py-1 rounded-lg group-hover:bg-salmon-dark transition-colors">S</span>
                                SCIA <span className="text-sm font-medium text-gray-600 hidden md:inline ml-2">セカンドキャリア・インキュベーション協会</span>
                            </a>

                            <nav className="hidden md:flex space-x-8">
                                {[
                                    { id: 'why', label: '0期生とは' },
                                    { id: 'benefits', label: '特典' },
                                    { id: 'program', label: 'プログラム' },
                                    { id: 'team', label: '運営チーム' },
                                    { id: 'pricing', label: '料金・申し込み' },
                                ].map((item, i) => (
                                    <button key={i} onClick={() => scrollTo(item.id)} className="text-gray-600 hover:text-mint-dark font-medium transition-colors text-sm">
                                        {item.label}
                                    </button>
                                ))}
                            </nav>

                            <div className="hidden md:block">
                                <button onClick={() => scrollTo('apply')} className="animate-pulse-ring bg-salmon hover:bg-salmon-dark text-white px-6 py-2.5 rounded-full font-bold text-sm transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5">
                                    0期生に申し込む
                                </button>
                            </div>

                            <button className="md:hidden text-gray-600" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                {isMenuOpen ? <XIcon size={28} /> : <MenuIcon size={28} />}
                            </button>
                        </div>

                        {/* モバイルメニュー */}
                        <div className={`md:hidden absolute w-full bg-white/95 backdrop-blur-md shadow-xl transition-all duration-300 overflow-hidden ${isMenuOpen ? 'max-h-screen border-t border-gray-100' : 'max-h-0'}`}>
                            <div className="px-4 pt-2 pb-6 space-y-2 flex flex-col">
                                {[
                                    { id: 'why', label: '0期生とは' },
                                    { id: 'benefits', label: '特典' },
                                    { id: 'program', label: 'プログラム' },
                                    { id: 'team', label: '運営チーム' },
                                    { id: 'pricing', label: '料金・申し込み' },
                                ].map((item, i) => (
                                    <button key={i} onClick={() => scrollTo(item.id)} className="text-left px-4 py-3 font-medium text-gray-600 hover:text-mint-dark hover:bg-mint-light/50 rounded-xl">
                                        {item.label}
                                    </button>
                                ))}
                                <button onClick={() => scrollTo('apply')} className="bg-salmon-dark text-white px-4 py-3 rounded-xl font-bold mt-4 shadow-md">
                                    0期生に申し込む
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* --- ヒーローセクション --- */}
                    <section id="top" className="pt-32 pb-20 md:pt-40 md:pb-32 relative overflow-hidden">
                        <div className="absolute top-[-10%] right-[-5%] w-96 h-96 bg-mint rounded-full mix-blend-multiply filter blur-[80px] opacity-60 animate-blob"></div>
                        <div className="absolute top-[20%] left-[-10%] w-72 h-72 bg-salmon rounded-full mix-blend-multiply filter blur-[80px] opacity-50 animate-blob" style={{ animationDelay: '2s' }}></div>

                        <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                            <div className="grid md:grid-cols-2 gap-12 items-center">
                                <div>
                                    <FadeIn delay={0}>
                                        {/* 0期生バッジ */}
                                        <div className="flex flex-wrap gap-3 mb-6">
                                            <span className="inline-flex items-center gap-1.5 py-1.5 px-4 rounded-full badge-zero text-sm font-black shadow-md tracking-wider">
                                                <RocketIcon size={14} /> テストフライト
                                            </span>
                                            <span className="inline-flex items-center gap-1.5 py-1.5 px-4 rounded-full bg-white text-salmon-dark text-sm font-bold shadow-sm border border-salmon-light">
                                                先着 3名限定
                                            </span>
                                        </div>
                                        <h1 className="text-4xl md:text-5xl lg:text-6xl font-black leading-tight mb-6 text-gray-800">
                                            あなたが、<br/>
                                            SCIAの<br/>
                                            <span className="text-gradient">「最初の翼」</span><br/>
                                            になる。
                                        </h1>
                                    </FadeIn>
                                    <FadeIn delay={200}>
                                        <p className="text-lg md:text-xl text-gray-600 mb-6 leading-relaxed font-medium">
                                            3ヶ月集中スクール「セカンドキャリア・インキュベーション」の第0期生として、プログラムの品質を一緒に磨き上げていただける先駆者を、<span className="text-salmon-dark font-bold">特別価格・少人数</span>で募集します。
                                        </p>
                                        {/* 価格強調 */}
                                        <div className="bg-white rounded-2xl p-5 shadow-md border-2 border-gold-light mb-8 inline-block">
                                            <p className="text-sm text-gray-500 mb-1 font-medium">通常価格 <span className="line-through">240,000円</span> のところ</p>
                                            <p className="text-4xl font-black text-gradient">98,000<span className="text-2xl">円</span></p>
                                            <p className="text-xs text-gray-400 mt-1">（税別）SCIAギルド年会費込み</p>
                                        </div>
                                        <div className="flex flex-col sm:flex-row gap-4">
                                            <button onClick={() => scrollTo('apply')} className="bg-salmon hover:bg-salmon-dark text-white text-center px-8 py-4 rounded-full font-bold text-lg shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 flex items-center justify-center gap-2">
                                                0期生に申し込む <ArrowRightIcon size={20} />
                                            </button>
                                            <button onClick={() => scrollTo('program')} className="bg-white/80 backdrop-blur-sm text-mint-dark border-2 border-mint-dark hover:bg-mint-light text-center px-8 py-4 rounded-full font-bold text-lg transition-colors">
                                                プログラム詳細
                                            </button>
                                        </div>
                                    </FadeIn>
                                </div>

                                <FadeIn delay={400} direction="left">
                                    <HeroSlider />
                                </FadeIn>
                            </div>
                        </div>
                    </section>
